<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>Newtonia</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      color: #fff;
      font-family: monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100dvh;
      overflow: hidden;
    }

    #game-container {
      position: relative;
      width: min(100vw, calc(100dvh * 4 / 3));
      aspect-ratio: 4 / 3;
    }

    canvas#canvas {
      display: block;
      width: 100%;
      height: 100%;
      /* Crisp pixels — the game renders its own smoothing */
      image-rendering: pixelated;
    }

    /* Loading overlay */
    #loading {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      background: #000;
      z-index: 10;
    }

    #loading-title {
      font-size: 2rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    #progress-bar-track {
      width: 60%;
      height: 4px;
      background: #333;
      border-radius: 2px;
      overflow: hidden;
    }

    #progress-bar-fill {
      height: 100%;
      width: 0%;
      background: #fff;
      transition: width 0.1s linear;
    }

    #loading-status {
      font-size: 0.75rem;
      color: #666;
    }

    /* Controls bar */
    #controls-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 0.4rem 0.6rem;
      gap: 0.5rem;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }

    #game-container:hover #controls-bar {
      opacity: 1;
      pointer-events: auto;
    }

    .ctrl-btn {
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.3);
      color: #fff;
      font-family: monospace;
      font-size: 0.7rem;
      padding: 0.3rem 0.6rem;
      cursor: pointer;
      border-radius: 3px;
    }

    .ctrl-btn:hover { background: rgba(255,255,255,0.25); }

    /* Touch controls overlay (visible on touch devices) */
    #touch-controls {
      display: none;
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    @media (pointer: coarse) {
      #touch-controls { display: block; }
    }

    /* Analog joystick rings — positioned in JS */
    .joy-base {
      position: absolute;
      border-radius: 50%;
      border: 2px solid rgba(100, 160, 255, 0.45);
      background: rgba(100, 160, 255, 0.07);
      pointer-events: none;
      transform: translate(-50%, -50%);
    }

    .joy-nub {
      position: absolute;
      border-radius: 50%;
      background: rgba(160, 205, 255, 0.80);
      box-shadow: 0 0 14px rgba(100, 160, 255, 0.50);
      pointer-events: none;
      transform: translate(-50%, -50%);
    }

    /* Left joystick capture zone */
    .joy-zone {
      position: absolute;
      left: 0; top: 0;
      width: 50%; height: 100%;
      pointer-events: auto;
      touch-action: none;
    }

    /* Action buttons — right half */
    .touch-btn {
      position: absolute;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: auto;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      font-size: 1.6rem;
      transition: background 0.06s, border-color 0.06s, transform 0.06s;
    }

    /* Full-screen tap-to-start overlay shown on the main menu */
    .menu-overlay {
      position: absolute;
      inset: 0;
      display: none;
      pointer-events: auto;
      touch-action: none;
    }

    /* Circular shoot / mine buttons — sized in JS, centred via transform in CSS */
    .touch-shoot, .touch-mine {
      border-radius: 50%;
      color: rgba(255, 255, 255, 0.65);
      transform: translate(-50%, -50%);
    }
    .touch-shoot {
      border: 2px solid rgba(255, 90, 90, 0.35);
      background: rgba(255, 90, 90, 0.07);
    }
    .touch-shoot.pressed {
      background: rgba(255, 90, 90, 0.28);
      border-color: rgba(255, 90, 90, 0.80);
      transform: translate(-50%, -50%) scale(0.93);
    }
    .touch-mine {
      border: 2px solid rgba(90, 150, 255, 0.35);
      background: rgba(90, 150, 255, 0.07);
    }
    .touch-mine.pressed {
      background: rgba(90, 150, 255, 0.28);
      border-color: rgba(90, 150, 255, 0.80);
      transform: translate(-50%, -50%) scale(0.93);
    }

    {{{ STYLE }}}
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="0"></canvas>

    <div id="loading">
      <div id="loading-title">Newtonia</div>
      <div id="progress-bar-track">
        <div id="progress-bar-fill"></div>
      </div>
      <div id="loading-status">Loading…</div>
    </div>

    <div id="controls-bar">
      <button class="ctrl-btn" id="fullscreen-btn" title="Fullscreen">&#x26F6;</button>
      <button class="ctrl-btn" id="mute-btn" title="Mute">&#x1F50A;</button>
    </div>

    <div id="touch-controls"></div>
  </div>

  <script>
    // Emscripten Module configuration — must be defined before the main script.
    var Module = {
      canvas: (function() {
        var canvas = document.getElementById('canvas');
        canvas.addEventListener('webglcontextlost', function(e) {
          e.preventDefault();
        }, false);
        return canvas;
      })(),

      setStatus: function(text) {
        var el = document.getElementById('loading-status');
        if (el) el.textContent = text || 'Ready';
      },

      monitorRunDependencies: function(left) {
        // no-op
      },

      onRuntimeInitialized: function() {
        var loading = document.getElementById('loading');
        if (loading) {
          loading.style.transition = 'opacity 0.4s';
          loading.style.opacity = '0';
          setTimeout(function() { loading.style.display = 'none'; }, 400);
        }
        // Focus canvas so keyboard events work immediately
        document.getElementById('canvas').focus();
      },

      // Progress bar
      print: function(text) { console.log(text); },
      printErr: function(text) { console.error(text); },
    };

    // Progress bar wired to XHR progress events via Emscripten's fetch hooks
    window.addEventListener('load', function() {
      var fill = document.getElementById('progress-bar-fill');
      // Emscripten fires 'progress' on the Module object for --preload-file data
      var origSetStatus = Module.setStatus;
      Module.setStatus = function(text) {
        origSetStatus(text);
        var match = text.match(/(\d+)\/(\d+)/);
        if (match && fill) {
          fill.style.width = (100 * parseInt(match[1]) / parseInt(match[2])) + '%';
        } else if (!text && fill) {
          fill.style.width = '100%';
        }
      };
    });
  </script>

  {{{ SCRIPT }}}

  <script src="main.js"></script>
</body>
</html>
