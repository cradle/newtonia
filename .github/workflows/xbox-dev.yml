name: Xbox GDK Desktop

# Builds the GDK Desktop target on every push so compile errors in the Xbox
# port are caught immediately — no Xbox hardware required.
# The Gaming.Desktop.x64 platform uses the same GDK APIs and ANGLE path as
# the Xbox console target, making it a fast, free iteration loop.

on:
  push:
    branches: [master, main, 'claude/**']
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      # Cache the entire GDK directory. Key doesn't include a hardcoded edition
      # so it survives winget upgrading the installed version.
      - name: Cache GDK
        id: cache-gdk
        uses: actions/cache@v4
        with:
          path: C:\Program Files (x86)\Microsoft GDK
          key: gdk-Microsoft.Gaming.GDK

      - name: Install GDK
        if: steps.cache-gdk.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          winget install -e --id Microsoft.Gaming.GDK `
            --accept-package-agreements `
            --accept-source-agreements `
            --disable-interactivity

      # The GDK installer registers GameDKLatest in the machine environment.
      # Read it here so subsequent steps use the real install path regardless
      # of which edition winget chose to install.
      - name: Locate GDK
        shell: pwsh
        run: |
          Write-Host "=== GDK-related machine env vars ==="
          [System.Environment]::GetEnvironmentVariables("Machine").GetEnumerator() |
            Where-Object { $_.Key -match "GDK|Gaming|GameDK" } |
            ForEach-Object { Write-Host "$($_.Key) = $($_.Value)" }

          Write-Host "`n=== Searching Program Files (x86) for GDKxPlatform.cmake ==="
          Get-ChildItem "C:\Program Files (x86)" -Filter "Microsoft GDK" -ErrorAction SilentlyContinue |
            ForEach-Object { Write-Host "Found dir: $($_.FullName)"; Get-ChildItem $_.FullName }

          Write-Host "`n=== Searching Program Files for GDKxPlatform.cmake ==="
          Get-ChildItem "C:\Program Files" -Filter "Microsoft GDK" -ErrorAction SilentlyContinue |
            ForEach-Object { Write-Host "Found dir: $($_.FullName)"; Get-ChildItem $_.FullName }

          Write-Host "`n=== winget list ==="
          winget list --id Microsoft.Gaming.GDK 2>&1

          $gdkLatest = [System.Environment]::GetEnvironmentVariable("GameDKLatest", "Machine")
          if (-not $gdkLatest) {
            # Fallback: search for the toolchain file under both Program Files roots.
            $f = Get-ChildItem "C:\Program Files (x86)\Microsoft GDK","C:\Program Files\Microsoft GDK" `
                   -Recurse -Filter "GDKxPlatform.cmake" -ErrorAction SilentlyContinue |
                 Select-Object -First 1
            if (-not $f) { Write-Error "GDK toolchain not found after install"; exit 1 }
            # Path is <edition>\GRDK\BuildFiles\CMake\GDKxPlatform.cmake
            $gdkLatest = $f.Directory.Parent.Parent.Parent.FullName
          }
          $gdkLatest = $gdkLatest.TrimEnd('\')
          $edition   = Split-Path $gdkLatest -Leaf
          $gdkRoot   = "$gdkLatest\GRDK"
          Write-Host "GDK root : $gdkRoot"
          Write-Host "Edition  : $edition"
          echo "GDK_ROOT=$gdkRoot"    >> $env:GITHUB_ENV
          echo "GDK_EDITION=$edition" >> $env:GITHUB_ENV

      - name: Configure (GDK Desktop)
        shell: pwsh
        run: |
          cmake -B xbox/build-desktop -S xbox `
            -DCMAKE_TOOLCHAIN_FILE="$env:GDK_ROOT\BuildFiles\CMake\GDKxPlatform.cmake" `
            -DGDK_TOOLCHAIN_EDITION=$env:GDK_EDITION `
            -A Gaming.Desktop.x64 `
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        shell: pwsh
        run: cmake --build xbox/build-desktop --config Release --parallel

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: newtonia-gdk-desktop
          path: |
            xbox/build-desktop/Release/newtonia.exe
            xbox/build-desktop/Release/audio/
          retention-days: 7
