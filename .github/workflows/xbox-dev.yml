name: Xbox GDK Desktop

# Builds the GDK Desktop target on every push so compile errors in the Xbox
# port are caught immediately — no Xbox hardware required.
# The Gaming.Desktop.x64 platform uses the same GDK APIs and ANGLE path as
# the Xbox console target, making it a fast, free iteration loop.

on:
  push:
    branches: [master, main, 'claude/**']
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      GDK_EDITION: "241000"
      GDK_ROOT: "C:\\Program Files (x86)\\Microsoft GDK\\241000\\GRDK"

    steps:
      - uses: actions/checkout@v4

      # The GDK is not in the public winget registry; it lives in the same
      # private cradle/assets release that holds the Steamworks SDK.
      # One-time setup: zip C:\Program Files (x86)\Microsoft GDK\241000
      # (preserving the 241000\ top-level folder) and upload it to the
      # cradle/assets sdk-latest release as gdk_241000.zip.
      # Add GDK_ASSET_TOKEN (PAT with read access to cradle/assets) as a
      # GitHub secret.
      - name: Cache GDK
        id: cache-gdk
        uses: actions/cache@v4
        with:
          path: C:\Program Files (x86)\Microsoft GDK\241000
          key: gdk-241000

      - name: Download GDK
        if: steps.cache-gdk.outputs.cache-hit != 'true'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GDK_ASSET_TOKEN }}
        run: |
          $headers   = @{ Authorization = "Bearer $env:GH_TOKEN"; Accept = "application/vnd.github+json" }
          $release   = Invoke-RestMethod -Uri "https://api.github.com/repos/cradle/assets/releases/tags/sdk-latest" -Headers $headers
          $asset     = $release.assets | Where-Object { $_.name -eq "gdk_241000.zip" } | Select-Object -First 1
          $dlHeaders = @{ Authorization = "Bearer $env:GH_TOKEN"; Accept = "application/octet-stream" }
          Invoke-WebRequest -Uri $asset.url -Headers $dlHeaders -OutFile gdk.zip
          Expand-Archive -Path gdk.zip -DestinationPath "C:\Program Files (x86)\Microsoft GDK"

      - name: Add GDK tools to PATH
        shell: pwsh
        run: echo "$env:GDK_ROOT\bin" >> $env:GITHUB_PATH

      - name: Configure (GDK Desktop)
        shell: pwsh
        run: |
          $toolchain = "$env:GDK_ROOT\BuildFiles\CMake\GDKxPlatform.cmake"
          cmake -B xbox/build-desktop -S xbox `
            -DCMAKE_TOOLCHAIN_FILE="$toolchain" `
            -DGDK_TOOLCHAIN_EDITION=$env:GDK_EDITION `
            -A Gaming.Desktop.x64 `
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        shell: pwsh
        run: cmake --build xbox/build-desktop --config Release --parallel

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: newtonia-gdk-desktop
          path: |
            xbox/build-desktop/Release/newtonia.exe
            xbox/build-desktop/Release/audio/
          retention-days: 7
