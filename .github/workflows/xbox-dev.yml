name: Xbox GDK Desktop

# Builds the GDK Desktop target on every push so compile errors in the Xbox
# port are caught immediately — no Xbox hardware required.
# The Gaming.Desktop.x64 platform uses the same GDK APIs and ANGLE path as
# the Xbox console target, making it a fast, free iteration loop.

on:
  push:
    branches: [master, main, 'claude/**']
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      # Cache the entire GDK directory. Key doesn't include a hardcoded edition
      # so it survives winget upgrading the installed version.
      - name: Cache GDK
        id: cache-gdk
        uses: actions/cache@v4
        with:
          path: C:\Program Files (x86)\Microsoft GDK
          key: gdk-Microsoft.Gaming.GDK

      - name: Install GDK
        if: steps.cache-gdk.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          winget install -e --id Microsoft.Gaming.GDK `
            --accept-package-agreements `
            --accept-source-agreements `
            --disable-interactivity

      # The GDK installer registers GameDKLatest in the machine environment.
      # Read it here so subsequent steps use the real install path regardless
      # of which edition winget chose to install.
      - name: Locate GDK
        shell: pwsh
        run: |
          # GameDKCoreLatest is what the installer actually sets (confirmed from logs).
          # Fall back to GameDKLatest for older installer versions.
          $gdkLatest = [System.Environment]::GetEnvironmentVariable("GameDKCoreLatest", "Machine")
          if (-not $gdkLatest) {
            $gdkLatest = [System.Environment]::GetEnvironmentVariable("GameDKLatest", "Machine")
          }
          if (-not $gdkLatest) {
            Write-Error "Neither GameDKCoreLatest nor GameDKLatest is set. GDK install may have failed."
            exit 1
          }
          $gdkLatest = $gdkLatest.TrimEnd('\')
          Write-Host "GameDKCoreLatest = $gdkLatest"

          Write-Host "`n=== Contents of edition directory (3 levels) ==="
          Get-ChildItem $gdkLatest -Recurse -Depth 3 -ErrorAction SilentlyContinue |
            Select-Object -ExpandProperty FullName | ForEach-Object { Write-Host $_ }

          $gdkRoot = "$gdkLatest\GRDK"
          $edition = Split-Path $gdkLatest -Leaf
          Write-Host "`nGDK root : $gdkRoot"
          Write-Host "Edition  : $edition"
          echo "GDK_ROOT=$gdkRoot"    >> $env:GITHUB_ENV
          echo "GDK_EDITION=$edition" >> $env:GITHUB_ENV

      - name: Configure (GDK Desktop)
        shell: pwsh
        run: |
          cmake -B xbox/build-desktop -S xbox `
            -DCMAKE_TOOLCHAIN_FILE="$env:GDK_ROOT\BuildFiles\CMake\GDKxPlatform.cmake" `
            -DGDK_TOOLCHAIN_EDITION=$env:GDK_EDITION `
            -A Gaming.Desktop.x64 `
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        shell: pwsh
        run: cmake --build xbox/build-desktop --config Release --parallel

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: newtonia-gdk-desktop
          path: |
            xbox/build-desktop/Release/newtonia.exe
            xbox/build-desktop/Release/audio/
          retention-days: 7
