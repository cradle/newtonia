name: Windows

on:
  push:
    branches: [master, main, 'claude/**']
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - uses: actions/checkout@v4

      - name: Checkout SDL2_mixer
        uses: actions/checkout@v4
        with:
          repository: libsdl-org/SDL_mixer
          ref: release-2.8.0
          path: SDL2_mixer-2.8.0
          fetch-depth: 1

      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-pkgconf
            mingw-w64-x86_64-freeglut
            mingw-w64-x86_64-SDL2
            mingw-w64-x86_64-mpg123

      - name: Build SDL2_mixer (static, WAV + MP3 only)
        run: |
          cmake -S SDL2_mixer-2.8.0 -B SDL2_mixer-build \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF \
            -DSDL2MIXER_VENDORED=OFF \
            -DSDL2MIXER_SAMPLES=OFF \
            -DSDL2MIXER_WAVE=ON \
            -DSDL2MIXER_MP3=ON \
            -DSDL2MIXER_MP3_MPG123=ON \
            -DSDL2MIXER_OGG=OFF \
            -DSDL2MIXER_VORBIS=OFF \
            -DSDL2MIXER_FLAC=OFF \
            -DSDL2MIXER_OPUS=OFF \
            -DSDL2MIXER_MOD=OFF \
            -DSDL2MIXER_MIDI=OFF \
            -DSDL2MIXER_WAVPACK=OFF
          cmake --build SDL2_mixer-build -j$(nproc)

      - name: Compile icon resource
        run: windres icon.rc -o icon_rc.o

      - name: Build
        run: |
          SRCS=$(find . -name "*.cpp" \
            -not -path "./android/*" \
            -not -path "./.git/*" \
            -not -path "./SDL2_mixer*" \
            -not -name "gles2_compat.cpp")
          g++ -O2 -Wall -std=c++11 -D_USE_MATH_DEFINES -o newtonia.exe $SRCS icon_rc.o \
            -ISDL2_mixer-2.8.0/include \
            -LSDL2_mixer-build \
            $(pkg-config --static --cflags --libs sdl2 freeglut) \
            -lSDL2_mixer -lmpg123 \
            -lopengl32 -lglu32 \
            -static

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: newtonia-windows
          path: newtonia.exe
          retention-days: 30
