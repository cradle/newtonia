name: Windows

on:
  push:
    branches: [master, main, 'claude/**']
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - uses: actions/checkout@v6

      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-pkgconf
            mingw-w64-x86_64-freeglut
            mingw-w64-x86_64-SDL2
            mingw-w64-x86_64-SDL2_mixer

      - name: Build
        run: |
          SRCS=$(find . -name "*.cpp" \
            -not -path "./android/*" \
            -not -path "./.git/*")
          windres icon.rc -O coff -o icon.res
          g++ -O2 -Wall -std=c++11 -D_USE_MATH_DEFINES -DFREEGLUT_STATIC \
            $(pkg-config --cflags sdl2 SDL2_mixer freeglut) \
            -o newtonia.exe $SRCS icon.res \
            -static \
            $(pkg-config --libs --static sdl2 SDL2_mixer freeglut) \
            -lopengl32 -lglu32

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: newtonia-windows
          path: |
            newtonia.exe
            audio/
          retention-days: 30
