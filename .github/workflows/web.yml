name: Web / GitHub Pages

on:
  push:
    branches: ['**']
  workflow_dispatch:

permissions:
  contents: write

# One deployment per branch at a time; cancel in-progress run on new push
concurrency:
  group: pages-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node (for tsc)
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install TypeScript
        run: npm install -g typescript

      - name: Compile TypeScript UI
        working-directory: web
        run: tsc

      - name: Install Emscripten SDK
        run: |
          git clone https://github.com/emscripten-core/emsdk.git ~/emsdk
          ~/emsdk/emsdk install latest
          ~/emsdk/emsdk activate latest

      - name: Build WebAssembly
        run: |
          source ~/emsdk/emsdk_env.sh
          emcc --version   # triggers sanity checks + sysroot initialisation
          make web

      - name: Sanitize branch name
        id: branch
        run: echo "name=$(echo '${{ github.ref_name }}' | sed 's|/|-|g')" >> $GITHUB_OUTPUT

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: web/dist
          destination_dir: ${{ steps.branch.outputs.name }}
          keep_files: true
