name: Deploy Steam

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      branch:
        description: 'Steam branch to deploy to (e.g. beta, default)'
        required: true
        default: 'default'

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-pkgconf
            mingw-w64-x86_64-freeglut
            mingw-w64-x86_64-SDL2
            mingw-w64-x86_64-SDL2_mixer

      - name: Build
        run: |
          SRCS=$(find . -name "*.cpp" \
            -not -path "./android/*" \
            -not -path "./.git/*")
          windres icon.rc -O coff -o icon.res
          g++ -O2 -std=c++11 -D_USE_MATH_DEFINES -DFREEGLUT_STATIC \
            $(pkg-config --cflags sdl2 SDL2_mixer freeglut) \
            -o newtonia.exe $SRCS icon.res \
            -static \
            $(pkg-config --libs --static sdl2 SDL2_mixer freeglut) \
            -lopengl32 -lglu32

      - name: Stage depot
        shell: bash
        run: |
          mkdir -p steam_output/windows
          cp newtonia.exe steam_output/windows/
          cp -r audio steam_output/windows/

      - uses: actions/upload-artifact@v4
        with:
          name: steam-windows
          path: steam_output/windows/

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install arm64 dependencies
        run: brew install sdl2 mpg123

      - name: Install x86_64 Homebrew and dependencies
        run: |
          arch -x86_64 /bin/bash -c \
            "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
          arch -x86_64 /usr/local/bin/brew install sdl2 mpg123

      - name: Build SDL2_mixer from source (WAV + MP3 only)
        run: |
          SDL_MIXER_VER=2.8.0
          curl -fsSL https://github.com/libsdl-org/SDL_mixer/releases/download/release-${SDL_MIXER_VER}/SDL2_mixer-${SDL_MIXER_VER}.tar.gz | tar xz
          cd SDL2_mixer-${SDL_MIXER_VER}

          cmake_flags=(
            -DCMAKE_BUILD_TYPE=Release
            -DSDL2MIXER_VENDORED=OFF
            -DSDL2MIXER_SAMPLES=OFF
            -DSDL2MIXER_OGG=OFF
            -DSDL2MIXER_FLAC=OFF
            -DSDL2MIXER_MIDI=OFF
            -DSDL2MIXER_OPUS=OFF
            -DSDL2MIXER_MOD=OFF
            -DSDL2MIXER_WAVPACK=OFF
            -DSDL2MIXER_MP3=ON
            -DSDL2MIXER_MP3_MPG123=ON
            -DSDL2MIXER_WAVE=ON
          )

          cmake -B build-arm64 "${cmake_flags[@]}" \
            -DCMAKE_PREFIX_PATH=/opt/homebrew \
            -DCMAKE_INSTALL_PREFIX=/opt/homebrew
          cmake --build build-arm64 -j$(sysctl -n hw.logicalcpu)
          install_name_tool -id /opt/homebrew/lib/libSDL2_mixer.dylib \
            build-arm64/libSDL2_mixer.dylib
          cp build-arm64/libSDL2_mixer.dylib /opt/homebrew/lib/libSDL2_mixer.dylib

          cmake -B build-x86 "${cmake_flags[@]}" \
            -DCMAKE_OSX_ARCHITECTURES=x86_64 \
            -DCMAKE_C_FLAGS="-target x86_64-apple-macos12.0" \
            -DCMAKE_CXX_FLAGS="-target x86_64-apple-macos12.0" \
            -DCMAKE_SHARED_LINKER_FLAGS="-target x86_64-apple-macos12.0" \
            -DCMAKE_TRY_COMPILE_TARGET_TYPE=STATIC_LIBRARY \
            -DCMAKE_PREFIX_PATH=/usr/local \
            -DCMAKE_INSTALL_PREFIX=/usr/local
          cmake --build build-x86 -j$(sysctl -n hw.logicalcpu)
          install_name_tool -id /usr/local/lib/libSDL2_mixer.dylib \
            build-x86/libSDL2_mixer.dylib
          cp build-x86/libSDL2_mixer.dylib /usr/local/lib/libSDL2_mixer.dylib

          cp include/SDL_mixer.h /opt/homebrew/include/SDL2/SDL_mixer.h
          cp include/SDL_mixer.h /usr/local/include/SDL2/SDL_mixer.h

      - name: Collect sources
        run: |
          find . -name "*.cpp" \
            -not -path "./android/*" \
            -not -path "./.git/*" > srcs.txt

      - name: Build arm64
        env:
          MACOSX_DEPLOYMENT_TARGET: "12.0"
        run: |
          clang++ -O2 -std=c++11 -arch arm64 \
            -mmacosx-version-min=12.0 \
            -DGL_SILENCE_DEPRECATION \
            -o newtonia-arm64 $(cat srcs.txt) macos_window.mm \
            $(/opt/homebrew/bin/sdl2-config --cflags --libs) \
            -L/opt/homebrew/lib -lSDL2_mixer \
            -I/opt/homebrew/include/SDL2 \
            -framework GLUT -framework OpenGL -framework AppKit

      - name: Build x86_64
        env:
          MACOSX_DEPLOYMENT_TARGET: "12.0"
        run: |
          clang++ -O2 -std=c++11 -arch x86_64 \
            -mmacosx-version-min=12.0 \
            -DGL_SILENCE_DEPRECATION \
            -o newtonia-x86_64 $(cat srcs.txt) macos_window.mm \
            $(/usr/local/bin/sdl2-config --cflags --libs) \
            -L/usr/local/lib -lSDL2_mixer \
            -I/usr/local/include/SDL2 \
            -framework GLUT -framework OpenGL -framework AppKit

      - name: Import Developer ID certificate
        env:
          CERT_BASE64: ${{ secrets.DEVELOPER_ID_CERT_BASE64 }}
          CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
        run: |
          printf '%s' "$CERT_BASE64" | base64 -d > "$RUNNER_TEMP/cert.p12"
          KEYCHAIN="$RUNNER_TEMP/build.keychain-db"
          security create-keychain -p "" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "" "$KEYCHAIN"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" \
            -P "$CERT_PASSWORD" -T /usr/bin/codesign
          security list-keychain -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"' | xargs) /Library/Keychains/System.keychain
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "" "$KEYCHAIN"

      - name: Create universal binary and bundle .app
        run: |
          lipo -create -output newtonia newtonia-arm64 newtonia-x86_64

          mkdir -p Newtonia.app/Contents/{MacOS,Frameworks,Resources}
          cp newtonia Newtonia.app/Contents/MacOS/newtonia
          cp icon.icns Newtonia.app/Contents/Resources/icon.icns
          cp -r audio Newtonia.app/Contents/Resources/audio

          FW="Newtonia.app/Contents/Frameworks"
          bundle() {
            local target="$1"
            while IFS= read -r dep; do
              local name dest arm x86
              name=$(basename "$dep")
              dest="$FW/$name"
              arm=$(echo "$dep" | sed 's|/usr/local/|/opt/homebrew/|g')
              x86=$(echo "$dep" | sed 's|/opt/homebrew/|/usr/local/|g')
              if [ ! -f "$dest" ]; then
                if [ "$arm" != "$x86" ] && [ -f "$arm" ] && [ -f "$x86" ]; then
                  lipo -create "$arm" "$x86" -output "$dest"
                elif [ -f "$dep" ]; then
                  cp "$dep" "$dest"
                elif [ -f "$arm" ]; then
                  cp "$arm" "$dest"
                elif [ -f "$x86" ]; then
                  cp "$x86" "$dest"
                else
                  echo "WARNING: $dep not found, skipping" >&2
                  continue
                fi
                install_name_tool -id "@executable_path/../Frameworks/$name" "$dest"
                bundle "$dest"
                codesign --sign "Developer ID Application" --force --timestamp \
                  --options runtime "$dest"
              fi
              install_name_tool -change "$arm" "@executable_path/../Frameworks/$name" "$target" 2>/dev/null || true
              install_name_tool -change "$x86" "@executable_path/../Frameworks/$name" "$target" 2>/dev/null || true
            done < <(
              { otool -arch arm64  -L "$target" 2>/dev/null
                otool -arch x86_64 -L "$target" 2>/dev/null; } \
              | awk '/^\t/{print $1}' \
              | grep -Ev '^(/usr/lib|/System|@)' \
              | sort -u
            )
          }

          bundle Newtonia.app/Contents/MacOS/newtonia
          codesign --sign "Developer ID Application" --force --timestamp \
            --options runtime \
            --entitlements macos/EntitlementsDevID.plist \
            Newtonia.app/Contents/MacOS/newtonia

          cat > Newtonia.app/Contents/Info.plist <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
            "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key>     <string>newtonia</string>
            <key>CFBundleIdentifier</key>     <string>com.newtonia.app</string>
            <key>CFBundleName</key>           <string>Newtonia</string>
            <key>CFBundleIconFile</key>       <string>icon</string>
            <key>CFBundleVersion</key>        <string>1.0</string>
            <key>CFBundlePackageType</key>    <string>APPL</string>
            <key>LSMinimumSystemVersion</key> <string>12.0</string>
          </dict>
          </plist>
          PLIST

      - name: Sign .app bundle
        run: |
          codesign --sign "Developer ID Application" --force --timestamp \
            --options runtime \
            --entitlements macos/EntitlementsDevID.plist \
            Newtonia.app

      - name: Notarize
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          NOTARY_PASSWORD: ${{ secrets.NOTARY_APP_SPECIFIC_PASSWORD }}
        run: |
          ditto -c -k --keepParent Newtonia.app newtonia-steam-macos.zip
          xcrun notarytool submit newtonia-steam-macos.zip \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$NOTARY_PASSWORD" \
            --wait
          xcrun stapler staple Newtonia.app

      - name: Stage depot
        run: |
          mkdir -p steam_output/macos
          cp -r Newtonia.app steam_output/macos/

      - uses: actions/upload-artifact@v4
        with:
          name: steam-macos
          path: steam_output/macos/

  build-linux:
    runs-on: ubuntu-22.04
    container: registry.gitlab.steamos.cloud/steamrt/sniper/sdk:latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y \
            freeglut3-dev \
            libgl1-mesa-dev \
            libglu1-mesa-dev \
            cmake \
            libudev-dev \
            libasound2-dev \
            libpulse-dev

      - name: Build SDL2 from source
        run: |
          git clone --depth 1 --branch SDL2 https://github.com/libsdl-org/SDL.git SDL2_source
          cmake -S SDL2_source -B SDL2_source/build \
            -DCMAKE_BUILD_TYPE=Release \
            -DSDL_SHARED=OFF \
            -DSDL_STATIC=ON \
            -DSDL_TESTS=OFF
          cmake --build SDL2_source/build --parallel
          cmake --install SDL2_source/build

      - name: Build SDL2_mixer (WAV + MP3 only)
        run: |
          git clone --depth 1 --branch SDL2 https://github.com/libsdl-org/SDL_mixer.git SDL2_mixer
          cmake -S SDL2_mixer -B SDL2_mixer/build \
            -DSDL2MIXER_WAV=ON \
            -DSDL2MIXER_MP3=ON \
            -DSDL2MIXER_FLAC=OFF \
            -DSDL2MIXER_VORBIS=OFF \
            -DSDL2MIXER_OPUS=OFF \
            -DSDL2MIXER_MOD=OFF \
            -DSDL2MIXER_MIDI=OFF \
            -DSDL2MIXER_WAVPACK=OFF \
            -DBUILD_SHARED_LIBS=OFF \
            -DSDL2MIXER_SAMPLES=OFF
          cmake --build SDL2_mixer/build --parallel
          cmake --install SDL2_mixer/build

      - name: Build
        run: |
          SRCS=$(find . -name "*.cpp" \
            -not -path "./android/*" \
            -not -path "./.git/*" \
            -not -path "./SDL2_source/*" \
            -not -path "./SDL2_mixer/*")
          g++ -O2 -Wall -std=c++11 \
            $(sdl2-config --cflags) -I/usr/local/include/SDL2 \
            -o newtonia $SRCS \
            -lglut -lGL -lGLU \
            -lSDL2_mixer $(sdl2-config --static-libs) \
            -lX11

      - name: Stage depot
        run: |
          mkdir -p steam_output/linux
          cp newtonia steam_output/linux/
          cp -r audio steam_output/linux/

      - uses: actions/upload-artifact@v4
        with:
          name: steam-linux
          path: steam_output/linux/

  deploy-steam:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: steam-windows
          path: steam_output/windows/

      - uses: actions/download-artifact@v4
        with:
          name: steam-macos
          path: steam_output/macos/

      - uses: actions/download-artifact@v4
        with:
          name: steam-linux
          path: steam_output/linux/

      - name: Deploy to Steam
        uses: game-ci/steam-deploy@v3
        with:
          username: ${{ secrets.STEAM_USERNAME }}
          configVdf: ${{ secrets.STEAM_CONFIG_VDF }}
          appId: ${{ secrets.STEAM_APP_ID }}
          buildDescription: ${{ github.ref_name || github.sha }}
          rootPath: steam_output
          depot1Path: windows
          depot2Path: macos
          depot3Path: linux
          releaseBranch: ${{ github.event.inputs.branch || 'beta' }}
