name: Linux

on:
  push:
    branches: [master, main, 'claude/**']
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libsdl2-dev \
            freeglut3-dev \
            libgl1-mesa-dev \
            libglu1-mesa-dev \
            cmake

      - name: Build SDL2_mixer (WAV + MP3 only)
        run: |
          git clone --depth 1 --branch SDL2 https://github.com/libsdl-org/SDL_mixer.git SDL2_mixer
          cmake -S SDL2_mixer -B SDL2_mixer/build \
            -DSDL2MIXER_WAV=ON \
            -DSDL2MIXER_MP3=ON \
            -DSDL2MIXER_FLAC=OFF \
            -DSDL2MIXER_VORBIS=OFF \
            -DSDL2MIXER_OPUS=OFF \
            -DSDL2MIXER_MOD=OFF \
            -DSDL2MIXER_MIDI=OFF \
            -DSDL2MIXER_WAVPACK=OFF \
            -DBUILD_SHARED_LIBS=OFF \
            -DSDL2MIXER_SAMPLES=OFF
          cmake --build SDL2_mixer/build --parallel
          sudo cmake --install SDL2_mixer/build

      - name: Build
        run: |
          SRCS=$(find . -name "*.cpp" \
            -not -path "./android/*" \
            -not -path "./.git/*")
          g++ -O2 -Wall -std=c++11 \
            $(sdl2-config --cflags) -I/usr/local/include/SDL2 \
            -o newtonia $SRCS \
            -lglut -lGL -lGLU \
            -lSDL2_mixer $(sdl2-config --static-libs)

      - name: Bundle
        run: |
          mkdir -p dist
          cp newtonia dist/
          cp -r audio dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: newtonia-linux
          path: dist/
          retention-days: 30
