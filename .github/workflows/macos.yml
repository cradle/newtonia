name: macOS

on:
  push:
    branches: [master, main, 'claude/**']
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest   # arm64 (Apple Silicon)

    steps:
      - uses: actions/checkout@v4

      - name: Install arm64 dependencies
        run: brew install sdl2 sdl2_mixer

      - name: Install x86_64 Homebrew and dependencies
        run: |
          arch -x86_64 /bin/bash -c \
            "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
          arch -x86_64 /usr/local/bin/brew install sdl2 sdl2_mixer

      - name: Collect sources
        run: |
          find . -name "*.cpp" \
            -not -path "./android/*" \
            -not -path "./.git/*" \
            -not -name "gles2_compat.cpp" > srcs.txt

      - name: Build arm64
        env:
          MACOSX_DEPLOYMENT_TARGET: "12.0"
        run: |
          clang++ -O2 -Wall -std=c++11 -arch arm64 \
            -mmacosx-version-min=12.0 \
            -o newtonia-arm64 $(cat srcs.txt) \
            $(/opt/homebrew/bin/sdl2-config --cflags --libs) \
            -L/opt/homebrew/lib -lSDL2_mixer \
            -I/opt/homebrew/include/SDL2 \
            -framework GLUT -framework OpenGL
          lipo -info newtonia-arm64

      - name: Build x86_64
        env:
          MACOSX_DEPLOYMENT_TARGET: "12.0"
        run: |
          clang++ -O2 -Wall -std=c++11 -arch x86_64 \
            -mmacosx-version-min=12.0 \
            -o newtonia-x86_64 $(cat srcs.txt) \
            $(/usr/local/bin/sdl2-config --cflags --libs) \
            -L/usr/local/lib -lSDL2_mixer \
            -I/usr/local/include/SDL2 \
            -framework GLUT -framework OpenGL
          lipo -info newtonia-x86_64

      - name: Create universal binary
        run: lipo -create -output newtonia newtonia-arm64 newtonia-x86_64

      - name: Bundle .app
        run: |
          mkdir -p Newtonia.app/Contents/{MacOS,Frameworks}
          cp newtonia Newtonia.app/Contents/MacOS/newtonia

          FW="Newtonia.app/Contents/Frameworks"

          # Recursively bundle all non-system dylibs into Frameworks/
          bundle() {
            local target="$1"
            # Collect deps from BOTH arch slices so fat-binary paths are all seen
            while IFS= read -r dep; do
              local name dest arm x86
              name=$(basename "$dep")
              dest="$FW/$name"
              # Compute the equivalent path in each Homebrew prefix
              arm=$(echo "$dep" | sed 's|/usr/local/|/opt/homebrew/|g')
              x86=$(echo "$dep" | sed 's|/opt/homebrew/|/usr/local/|g')
              if [ ! -f "$dest" ]; then
                if [ "$arm" != "$x86" ] && [ -f "$arm" ] && [ -f "$x86" ]; then
                  lipo -create "$arm" "$x86" -output "$dest"
                elif [ -f "$dep" ]; then
                  cp "$dep" "$dest"
                elif [ -f "$arm" ]; then
                  cp "$arm" "$dest"
                elif [ -f "$x86" ]; then
                  cp "$x86" "$dest"
                else
                  echo "WARNING: $dep not found, skipping" >&2
                  continue
                fi
                install_name_tool -id "@executable_path/../Frameworks/$name" "$dest"
                bundle "$dest"
                codesign --sign - --force "$dest"
              fi
              # Rewrite both arch prefixes in the target (fat binary has both)
              install_name_tool -change "$arm" "@executable_path/../Frameworks/$name" "$target" 2>/dev/null || true
              install_name_tool -change "$x86" "@executable_path/../Frameworks/$name" "$target" 2>/dev/null || true
            done < <(
              { otool -arch arm64  -L "$target" 2>/dev/null
                otool -arch x86_64 -L "$target" 2>/dev/null; } \
              | awk '/^\t/{print $1}' \
              | grep -Ev '^(/usr/lib|/System|@)' \
              | sort -u
            )
          }

          bundle Newtonia.app/Contents/MacOS/newtonia
          codesign --sign - --force Newtonia.app/Contents/MacOS/newtonia

          cat > Newtonia.app/Contents/Info.plist <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
            "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key>     <string>newtonia</string>
            <key>CFBundleIdentifier</key>     <string>com.newtonia.app</string>
            <key>CFBundleName</key>           <string>Newtonia</string>
            <key>CFBundleVersion</key>        <string>1.0</string>
            <key>CFBundlePackageType</key>    <string>APPL</string>
            <key>LSMinimumSystemVersion</key> <string>12.0</string>
          </dict>
          </plist>
          PLIST

          # Zip with the .app wrapper intact
          zip -r Newtonia.zip Newtonia.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: newtonia-macos-universal
          path: Newtonia.zip
          retention-days: 30
