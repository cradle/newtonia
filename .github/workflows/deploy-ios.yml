name: Deploy iOS (TestFlight / App Store)

# Triggered by pushing a version tag, e.g.:
#   git tag v1.0.0 && git push --tags
# Or manually from the Actions tab.
on:
  push:
    tags:
      - 'v*.*.*'
    branches:
      - 'claude/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: newtonia

      - name: Clone SDL2
        run: git clone --depth 1 --branch SDL2 https://github.com/libsdl-org/SDL.git SDL2

      - name: Clone SDL2_mixer
        run: |
          git clone --depth 1 --branch SDL2 https://github.com/libsdl-org/SDL_mixer.git SDL2_mixer
          git -C SDL2_mixer submodule update --init --depth 1

      - name: Build SDL2 static library for iOS (arm64 device)
        run: |
          cmake -S SDL2 -B SDL2/build-ios \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_SYSROOT=iphoneos \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=13.0 \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DSDL_SHARED=OFF \
            -DSDL_STATIC=ON \
            -DCMAKE_XCODE_ATTRIBUTE_CODE_SIGN_IDENTITY="" \
            -DCMAKE_XCODE_ATTRIBUTE_CODE_SIGNING_REQUIRED=NO
          cmake --build SDL2/build-ios --config Release

      - name: Build SDL2_mixer static library for iOS (arm64 device)
        run: |
          SDL2_LIB=$(find "$(pwd)/SDL2/build-ios" -name "libSDL2.a" | head -1)
          cmake -S SDL2_mixer -B SDL2_mixer/build-ios \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_SYSROOT=iphoneos \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=13.0 \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DSDL_SHARED=OFF \
            -DSDL2MIXER_SHARED=OFF \
            -DBUILD_SHARED_LIBS=OFF \
            -DSDL2MIXER_SAMPLES=OFF \
            -DSDL2MIXER_VORBIS="" \
            -DSDL2MIXER_WAVPACK=OFF \
            -DSDL2MIXER_FLAC=OFF \
            -DSDL2MIXER_OPUS=OFF \
            -DSDL2MIXER_MOD=OFF \
            -DSDL2MIXER_MIDI=OFF \
            -DSDL2MIXER_MP3=OFF \
            -DSDL2_LIBRARY="$SDL2_LIB" \
            -DSDL2_INCLUDE_DIR="$(pwd)/SDL2/include" \
            -DCMAKE_XCODE_ATTRIBUTE_CODE_SIGN_IDENTITY="" \
            -DCMAKE_XCODE_ATTRIBUTE_CODE_SIGNING_REQUIRED=NO
          cmake --build SDL2_mixer/build-ios --config Release

      - name: Collect game sources
        run: |
          find newtonia -name "*.cpp" \
            -not -name "glut.cpp" \
            -not -name "android_main.cpp" \
            -not -path "*/android/*" \
            -not -path "*/.git/*" \
            -not -path "*/CMakeFiles/*" \
            | sed 's|^newtonia/||' \
            > srcs.txt
          echo "ios_main.mm" >> srcs.txt

      # Compile against the real iphoneos SDK (arm64 only — real device).
      - name: Compile Newtonia for iOS (arm64 real device)
        run: |
          SYSROOT=$(xcrun --sdk iphoneos --show-sdk-path)
          SDL2_LIB=$(find SDL2/build-ios -name "libSDL2.a" | head -1)
          SDL2MAIN_LIB=$(find SDL2/build-ios -name "libSDL2main.a" | head -1)
          SDL2MIX_LIB=$(find SDL2_mixer/build-ios -name "libSDL2_mixer.a" | head -1)

          mkdir -p obj
          while IFS= read -r src; do
            objname=$(echo "$src" | tr '/' '_' | sed -E 's/\.(cpp|mm)$/.o/')
            clang++ -arch arm64 -isysroot "$SYSROOT" \
              -miphoneos-version-min=13.0 \
              -std=c++11 -O2 \
              -D__IOS__=1 \
              -Inewtonia -Inewtonia/view -Inewtonia/weapon \
              -ISDL2/include \
              -ISDL2_mixer/include \
              -c "newtonia/$src" -o "obj/$objname"
          done < srcs.txt

          OBJS=$(find obj -name '*.o' | sort)
          mkdir -p Newtonia.app
          clang++ -arch arm64 -isysroot "$SYSROOT" \
            -miphoneos-version-min=13.0 \
            -o Newtonia.app/Newtonia \
            $OBJS \
            "$SDL2MAIN_LIB" \
            "$SDL2_LIB" \
            "$SDL2MIX_LIB" \
            -framework OpenGLES \
            -framework UIKit \
            -framework Foundation \
            -framework CoreGraphics \
            -framework CoreMotion \
            -framework CoreAudio \
            -framework AudioToolbox \
            -framework AVFoundation \
            -framework CoreBluetooth \
            -framework CoreHaptics \
            -framework GameController \
            -framework QuartzCore \
            -framework Metal

      - name: Bundle .app
        run: |
          cp newtonia/ios/Info.plist Newtonia.app/Info.plist
          TAG_VERSION="${{ github.ref_name }}"
          VERSION="${TAG_VERSION#v}"
          # Fall back to 1.0 if not triggered by a version tag
          if ! echo "$VERSION" | grep -qE '^[0-9]+(\.[0-9]+){0,2}$'; then
            VERSION="1.0"
          fi
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $VERSION" Newtonia.app/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $VERSION" Newtonia.app/Info.plist

      # Import the Apple Distribution certificate and provisioning profile.
      # One-time setup required:
      #   1. In Apple Developer Portal, create an App ID for cc.gfm.Newtonia
      #   2. Create an App Store Distribution provisioning profile
      #   3. Export the Distribution certificate as .p12, base64-encode it:
      #        base64 -w0 Certificates.p12  → DISTRIBUTION_CERT_BASE64 secret
      #   4. base64-encode the .mobileprovision file:
      #        base64 -w0 Newtonia.mobileprovision  → PROVISIONING_PROFILE_BASE64 secret
      #   5. Create an App Store Connect API Key (see appstoreconnect.apple.com/access/api)
      #      Store as: APP_STORE_CONNECT_API_KEY_ID, APP_STORE_CONNECT_ISSUER_ID,
      #                APP_STORE_CONNECT_API_KEY_CONTENT
      - name: Import code signing certificate
        env:
          CERT_BASE64: ${{ secrets.DISTRIBUTION_CERT_BASE64 }}
          CERT_PASSWORD: ${{ secrets.DISTRIBUTION_CERT_PASSWORD }}
        run: |
          echo "$CERT_BASE64" | base64 -d > "$RUNNER_TEMP/cert.p12"
          KEYCHAIN="$RUNNER_TEMP/build.keychain-db"
          security create-keychain -p "" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "" "$KEYCHAIN"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" \
            -P "$CERT_PASSWORD" -T /usr/bin/codesign
          security list-keychain -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"' | xargs)
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "" "$KEYCHAIN"
          echo "Available signing identities:"
          security find-identity -v -p codesigning "$KEYCHAIN"

      - name: Install provisioning profile
        env:
          PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
        run: |
          echo "$PROFILE_BASE64" | base64 -d > profile.mobileprovision
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          UUID=$(security cms -D -i profile.mobileprovision \
            | plutil -extract UUID xml1 -o - - \
            | sed -n 's|.*<string>\(.*\)</string>.*|\1|p')
          cp profile.mobileprovision \
            ~/Library/MobileDevice/Provisioning\ Profiles/"$UUID".mobileprovision
          # Also embed it inside the .app bundle as required by App Store
          cp profile.mobileprovision Newtonia.app/embedded.mobileprovision

      - name: Sign .app
        run: |
          IDENTITY=$(security find-identity -v -p codesigning "$RUNNER_TEMP/build.keychain-db" \
            | grep -E '"(Apple Distribution|iPhone Distribution)' \
            | head -1 \
            | sed -E 's/.*"(.+)"/\1/')
          echo "Signing with: $IDENTITY"
          codesign --force --sign "$IDENTITY" \
            --entitlements newtonia/ios/Entitlements.plist \
            Newtonia.app

      # Package as .ipa (the format required for App Store submission).
      - name: Package as .ipa
        run: |
          mkdir -p Payload
          cp -r Newtonia.app Payload/
          zip -r Newtonia.ipa Payload

      # Upload to TestFlight. Testers can install immediately;
      # submit for App Store review from App Store Connect UI.
      - name: Upload to TestFlight
        uses: apple-actions/upload-testflight-build@v1
        with:
          app-path: Newtonia.ipa
          issuer-id: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          api-key-id: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          api-private-key: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
