name: Deploy Android (Google Play)

# Triggered by pushing a version tag, e.g.:
#   git tag v1.0.0 && git push --tags
# Or manually from the Actions tab.
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: newtonia

      - name: Clone SDL2
        run: git clone --depth 1 --branch SDL2 https://github.com/libsdl-org/SDL.git SDL2

      - name: Clone SDL2_mixer
        run: |
          git clone --depth 1 --branch SDL2 https://github.com/libsdl-org/SDL_mixer.git SDL2_mixer
          git -C SDL2_mixer submodule update --init --depth 1

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK and CMake
        run: sdkmanager "ndk;26.3.11579264" "cmake;3.22.1"

      # TEST MODE: build a debug AAB (no signing secrets required) and upload
      # as a workflow artifact to verify the build works end-to-end.
      # TODO: replace with signed release build + Play Store upload once
      #       the Play Console account is verified and secrets are configured.
      - name: Build debug AAB
        working-directory: newtonia/android
        env:
          ANDROID_NDK_ROOT: ${{ env.ANDROID_HOME }}/ndk/26.3.11579264
        run: ./gradlew bundleDebug --stacktrace

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: newtonia-debug-aab
          path: newtonia/android/app/build/outputs/bundle/debug/app-debug.aab
          retention-days: 7
